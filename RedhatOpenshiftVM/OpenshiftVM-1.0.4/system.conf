{
  "name": "OpenShift Virt",
  "version": "1.0.4",
  "author": "Forescout Community",
  "testEnable": true,
  "panels": [
    {
      "title": "OpenShift Virt Connection",
      "description": "OpenShift Virtualization Connection",
      "fields": [
        {
          "display": "Cluster API URL",
          "field ID": "connect_openshiftvirt_url",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "true",
          "identifier": "true",
          "tooltip": "OpenShift Kubernetes API URL (e.g. https://api.mycluster.example.com:6443)"
        },
        {
          "display": "Service Account Token",
          "field ID": "connect_openshiftvirt_token",
          "type": "encrypted",
          "mandatory": "true",
          "tooltip": "Bearer token for a ServiceAccount with RBAC access to kubevirt.io resources"
        },
        {
          "certification validation": true
        }
      ]
    },
    {
      "focal appliance": true,
      "title": "Assign CounterACT Devices",
      "description": "<html>Select the connecting CounterACT device that will communicate with the targeted OpenShift Virtualization cluster, including requests by other CounterACT devices. Specific CounterACT devices assigned here cannot be assigned to another server elsewhere.<br><br>If you do not assign specific devices, by default, all devices will be assigned to one server. This server becomes known as the Default Server.<html>"
    },
    {
      "proxy server": true,
      "title": "Proxy Server",
      "description": "<html>Select a Proxy Server device to manage all communication between CounterACT and OpenShift Virtualization.<html>"
    },
    {
      "title": "OpenShift Virt Options",
      "description": "OpenShift Virtualization Options",
      "fields": [
        {
          "host discovery": true,
          "display": "Discovery Frequency (in minutes)",
          "max": 43200,
          "add to column": "true",
          "show column": "false",
          "value": 240
        },
        {
          "rate limiter": true,
          "display": "Number of API queries per second",
          "unit": 1,
          "min": 1,
          "max": 100,
          "add to column": "true",
          "show column": "false",
          "value": 10
        }
      ]
    }
  ]
}
