{
  "name": "Oracle KVM",
  "version": "1.0.8",
  "author": "Forescout Community",
  "testEnable": true,
  "panels": [
    {
      "title": "Oracle KVM Connection",
      "description": "Oracle KVM Connection",
      "fields": [
        {
          "display": "Server URL",
          "field ID": "connect_oraclekvm_url",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "true",
          "identifier": "true",
          "tooltip": "Base URL of the OLVM Engine (e.g. https://olvm.example.com)"
        },
        {
          "display": "Username",
          "field ID": "connect_oraclekvm_username",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "false",
          "tooltip": "OLVM admin username (e.g. admin)",
          "value": "admin"
        },
        {
          "display": "Password",
          "field ID": "connect_oraclekvm_password",
          "type": "encrypted",
          "mandatory": "true",
          "tooltip": "Password for the OLVM admin user"
        },
        {
          "display": "Auth Domain",
          "field ID": "connect_oraclekvm_domain",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "false",
          "tooltip": "Authentication domain (e.g. internal, ldap-domain). Used to build user@domain.",
          "value": "internal"
        },
        {
          "certification validation": true
        },
        {
          "authorization": true,
          "display": "Authorization Interval (in minutes)",
          "min": 1,
          "max": 100,
          "value": 28
        }
      ]
    },
    {
      "focal appliance": true,
      "title": "Assign CounterACT Devices",
      "description": "<html>Select the connecting CounterACT device that will communicate with the targeted Oracle KVM instance, including requests by other CounterACT devices. Specific CounterACT devices assigned here cannot be assigned to another server elsewhere.<br><br>If you do not assign specific devices, by default, all devices will be assigned to one server. This server becomes known as the Default Server.</html>"
    },
    {
      "proxy server": true,
      "title": "Proxy Server",
      "description": "<html>Select a Proxy Server device to manage all communication between CounterACT and Oracle KVM.</html>"
    },
    {
      "title": "Oracle KVM Options",
      "description": "Oracle KVM Options",
      "fields": [
        {
          "host discovery": true,
          "display": "Discovery Frequency (in minutes)",
          "max": 43200,
          "add to column": "true",
          "show column": "false",
          "value": 240
        },
        {
          "rate limiter": true,
          "display": "Number of API queries per second",
          "unit": 1,
          "min": 1,
          "max": 100,
          "add to column": "true",
          "show column": "false",
          "value": 10
        }
      ]
    }
  ]
}
