{
    "name": "Nuvolo",
    "version": "1.0.1",
    "author": "Forescout eyeExtend",
    "testEnable": true,
    "panels": [
        {
            "title": "Nuvolo Connection",
            "description": "Nuvolo ServiceNow instance connection configuration",
            "fields": [
                {
                    "display": "Nuvolo Instance URL",
                    "field ID": "connect_nuvolo_instance_url",
                    "type": "shortString",
                    "mandatory": "true",
                    "add to column": "true",
                    "show column": "true",
                    "identifier": "true",
                    "tooltip": "ServiceNow instance URL (e.g., ven05225.service-now.com)"
                },
                {
                    "display": "Client ID",
                    "field ID": "connect_nuvolo_client_id",
                    "type": "shortString",
                    "mandatory": "true",
                    "add to column": "true",
                    "show column": "false",
                    "tooltip": "OAuth2 Client ID"
                },
                {
                    "display": "Client Secret",
                    "field ID": "connect_nuvolo_client_secret",
                    "type": "encrypted",
                    "mandatory": "true",
                    "add to column": "false",
                    "show column": "false",
                    "tooltip": "OAuth2 Client Secret"
                },
                {
                    "display": "Forescout Cloud URL",
                    "field ID": "connect_nuvolo_forescout_cloud_url",
                    "type": "shortString",
                    "mandatory": "false",
                    "add to column": "true",
                    "show column": "false",
                    "tooltip": "Forescout Cloud URL for asset links (e.g., https://stg.cloud.forescout.com)"
                },
                {
                    "certification validation": true
                },
                {
                    "authorization": true,
                    "display": "Authorization refresh interval (in minutes)",
                    "min": 1,
                    "max": 2400,
                    "value": 28
                }
            ]
        },
        {
            "focal appliance": true,
            "title": "Assign CounterACT Devices",
            "description": "<html>Select the connecting CounterACT device that will communicate with the targeted Nuvolo instance, including requests by other CounterACT devices. Specific CounterACT devices assigned here cannot be assigned to another server elsewhere.<br><br>If you do not assign specific devices, by default, all devices will be assigned to one server. This server becomes known as the Default Server.</html>"
        },
        {
            "proxy server": true,
            "title": "Proxy Server",
            "description": "<html>Select a Proxy Server device to manage all communication between CounterACT and Nuvolo.</html>"
        },
        {
            "title": "Nuvolo Options",
            "description": "Nuvolo API options and rate limiting",
            "fields": [
                {
                    "rate limiter": true,
                    "display": "Number of API calls per second",
                    "unit": 1,
                    "min": 1,
                    "max": 1000,
                    "add to column": "true",
                    "show column": "false",
                    "value": 100
                }
            ]
        }
    ]
}
