{
	"name": "Meraki MX",
	"groups": [
		{
			"name":"connect_merakimx_merakimx",
			"label":"Meraki MX"
		}
	],
	"properties": [
		{
			"tag":"connect_merakimx_mxname",
			"label":"Meraki MX Device Name",
			"description":"Name of the Meraki MX Device host is connected to",
			"type":"string",
			"group": "connect_merakimx_merakimx",
			"inventory": {
				"enable": true,
				"description": "Inventory of Meraki MX Device Name"
			},
			"track_change": {
				"enable": true,
				"label": "Meraki MX Device Name Changed",
				"description": "Track Change property for Meraki MX Device Name"
			},
			"dependencies": [
				{
					"name": "mac",
					"redo_new": true,
					"redo_change": true
				}
			]
		},
		{
			"tag":"connect_merakimx_mxport",
			"label":"Meraki MX Port",
			"description":"Meraki MX Port host is connected to",
			"type":"string",
			"group": "connect_merakimx_merakimx",
			"track_change": {
				"enable": true,
				"label": "Meraki MX Port Changed",
				"description": "Track Change property for Meraki MX Port"
			},
			"dependencies": [
				{
					"name": "mac",
					"redo_new": true,
					"redo_change": true
				}
			]
		},
		{
			"tag":"connect_merakimx_mxporttype",
			"label":"Meraki MX Port Type",
			"description":"Meraki MX Port Type (Trunk or Access) host is connected to",
			"type":"string",
			"group": "connect_merakimx_merakimx",
			"track_change": {
				"enable": true,
				"label": "Meraki MX Port Type Changed",
				"description": "Track Change property for Meraki MX Port Type"
			},
			"dependencies": [
				{
					"name": "mac",
					"redo_new": true,
					"redo_change": true
				}
			]
		},
		{
			"tag":"connect_merakimx_mxvlan",
			"label":"Meraki MX VLAN",
			"description":"Meraki MX VLAN host is connected to",
			"type":"string",
			"group": "connect_merakimx_merakimx",
			"track_change": {
				"enable": true,
				"label": "Meraki MX VLAN Changed",
				"description": "Track Change property for Meraki MX VLAN"
			},
			"dependencies": [
				{
					"name": "mac",
					"redo_new": true,
					"redo_change": true
				}
			]
		},
		{
			"tag":"connect_merakimx_mxnetid",
			"label":"Meraki MX Network ID",
			"description":"Network ID for Meraki MX host is connected to",
			"type":"string",
			"group": "connect_merakimx_merakimx",
			"dependencies": [
				{
					"name": "mac",
					"redo_new": true,
					"redo_change": true
				}
			]
		}
	],
	"action_groups": [
		{
			"name":"connect_merakimx_merakimx",
			"label":"Meraki MX"
		}
	],
	"actions": [
		{
			"name":"connect_merakimx_assign_vlan",
			"label":"Assign to VLAN - Meraki MX",
			"group": "connect_merakimx_merakimx",
			"description": "Assign to VLAN on Meraki MX Access Port",
			"threshold_percentage": 5,
			"params": [
				{
					"name": "connect_merakimx_action_vlan",
					"label": "VLAN ID",
					"description": "Meraki MX VLAN ID",
					"type": "string"
				}
			],
			"dependencies": [
				{
					"name": "mac",
					"redo_new": true,
					"redo_change": true
				}
			],
			"undo": {
				"label":"Cancel Assign to VLAN - Meraki MX",
				"description":"Revert the VLAN on Meraki MX Access Port to Previous VLAN"
			}
		}
	],
	"scripts": [
		{
			"name": "merakimx_resolve.py",
			"properties": [
				"connect_merakimx_mxname",
				"connect_merakimx_mxport",
				"connect_merakimx_mxporttype",
				"connect_merakimx_mxvlan",
				"connect_merakimx_mxnetid"
			]
		},
		{
			"name": "merakimx_assign_vlan.py",
			"actions": [
				"connect_merakimx_assign_vlan"
			]
		},
		{
			"name": "merakimx_revert_vlan.py",
			"is_cancel": true,
			"actions": [
				"connect_merakimx_assign_vlan"
			]
		},
		{
			"name": "merakimx_test.py",
			"test": true
		},
		{
			"name": "merakimx_cache.py",
			"app_instance_cache": true
		}
	]
}