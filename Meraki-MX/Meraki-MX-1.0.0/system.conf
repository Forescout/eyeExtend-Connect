	"testEnable": true,
	"panels":[
		{
			"title": "Meraki Connection",
			"description": "Meraki Connection",
			"fields": [
				{
					"display": "Meraki Dashboard API URL",
					"field ID": "connect_merakimx_url",
					"type": "shortString",
					"mandatory": "true",
					"add to column": "true",
					"show column": "true",
					"identifier": "true",
					"tooltip": "e.g. api.meraki.com"
				},      
				{
					"display": "Meraki API Key",
					"field ID": "connect_merakimx_api_key",
					"add to column": "true",
					"show column": "true",
					"type": "shortString",
					"mandatory": "true"
				},      
				{
					"display": "Meraki Organisation Name",
					"field ID": "connect_merakimx_org",
					"add to column": "true",
					"show column": "true",
					"type": "shortString",
					"mandatory": "true"
				},
				{
					"certification validation": "true"
				}
			]
		},
		{
			"title": "Meraki Test",
			"description": "Meraki Test",
			"fields": [
				{
					"display": "Test MAC Address",
					"field ID": "connect_merakimx_testmac",
					"type": "shortString",
					"mandatory": "true"
				}
			]
		},
		{
			"focal appliance": true,
			"title": "Assign Forescout Devices",
			"description": "<html>Select the connecting Forescout device that will communicate with the Meraki Dashboard API, including requests by other Forescout devices. Specific Forescout devices assigned here cannot be assigned to another server elsewhere.<br><br>If you do not assign specific devices, by default, all devices will be assigned to one server. This server becomes known as the Default Server.</html>"
		},
		{
			"proxy server": true,
			"title": "Proxy Server",
			"description": "<html>Select a Proxy Server device to manage all communication between Forescout and the Meraki Dashboard API.</html>"
		},
		{
			"title": "Meraki Options",
			"description": "Meraki Options",
			"fields": [
				{
					"app_instance_cache": true,
					"display": "Cache refresh interval (in minutes)",
					"min": 5,
					"max": 2880,
					"value": 1440
				}
			]
		}
	]
