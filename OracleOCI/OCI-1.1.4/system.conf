{
  "name": "OCI",
  "version": "1.1.4",
  "author": "Forescout Community",
  "testEnable": true,
  "panels": [
    {
      "title": "OCI Connection",
      "description": "OCI Connection",
      "fields": [
        {
          "display": "Region (optional)",
          "field ID": "connect_oci_region",
          "type": "shortString",
          "mandatory": "false",
          "add to column": "true",
          "show column": "true",
          "identifier": "true",
          "tooltip": "OCI region identifier (e.g. us-ashburn-1). Leave blank to auto-discover all subscribed regions."
        },
        {
          "display": "Tenancy OCID",
          "field ID": "connect_oci_tenancy_ocid",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "false",
          "tooltip": "Tenancy OCID (e.g. ocid1.tenancy.oc1..aaaaaaaexample)"
        },
        {
          "display": "User OCID",
          "field ID": "connect_oci_user_ocid",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "false",
          "tooltip": "User OCID for API access (e.g. ocid1.user.oc1..aaaaaaaexample)"
        },
        {
          "display": "API Key Fingerprint",
          "field ID": "connect_oci_fingerprint",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "false",
          "tooltip": "API key fingerprint in colon-separated hex format (e.g. 12:34:56:78:90:ab:cd:ef:...)"
        },
        {
          "display": "Private Key (PEM)",
          "field ID": "connect_oci_private_key",
          "type": "encrypted",
          "mandatory": "true",
          "tooltip": "RSA private key in PEM format for OCI API signing"
        },
        {
          "certification validation": true
        }
      ]
    },
    {
      "focal appliance": true,
      "title": "Assign CounterACT Devices",
      "description": "<html>Select the connecting CounterACT device that will communicate with the targeted OCI instance, including requests by other CounterACT devices. Specific CounterACT devices assigned here cannot be assigned to another server elsewhere.<br><br>If you do not assign specific devices, by default, all devices will be assigned to one server. This server becomes known as the Default Server.</html>"
    },
    {
      "proxy server": true,
      "title": "Proxy Server",
      "description": "<html>Select a Proxy Server device to manage all communication between CounterACT and OCI.</html>"
    },
    {
      "title": "OCI Options",
      "description": "OCI Options",
      "fields": [
        {
          "host discovery": true,
          "display": "Discovery Frequency (in minutes)",
          "max": 43200,
          "add to column": "true",
          "show column": "false",
          "value": 30
        },
        {
          "rate limiter": true,
          "display": "Number of API queries per second",
          "unit": 1,
          "min": 1,
          "max": 100,
          "add to column": "true",
          "show column": "false",
          "value": 10
        }
      ]
    }
  ]
}
