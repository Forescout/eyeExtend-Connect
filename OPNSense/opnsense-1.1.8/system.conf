{
  "name": "OPNSense",
  "version": "1.1.8",
  "author": "Forescout Community",
  "testEnable": true,
  "panels": [
    {
      "title": "OPNSense Connection",
      "description": "OPNSense Connection",
      "fields": [
        {
          "display": "Firewall URL",
          "field ID": "connect_opnsense_url",
          "type": "longString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "true",
          "identifier": "true",
          "tooltip": "Base URL of the OPNSense firewall (e.g. https://192.168.1.1). For multiple firewalls, use comma-separated values."
        },
        {
          "display": "API Key",
          "field ID": "connect_opnsense_api_key",
          "type": "longString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "false",
          "tooltip": "OPNSense API Key (generated under System > Access > Users). For multiple firewalls, use comma-separated values aligned with Firewall URL."
        },
        {
          "display": "API Secret",
          "field ID": "connect_opnsense_api_secret",
          "type": "encrypted",
          "mandatory": "true",
          "tooltip": "OPNSense API Secret (shown only once when key is created). For multiple firewalls, use comma-separated values aligned with Firewall URL."
        },
        {
          "display": "LAN Interface",
          "field ID": "connect_opnsense_lan_interface",
          "type": "longString",
          "mandatory": "false",
          "add to column": "true",
          "show column": "false",
          "tooltip": "OPNSense LAN interface name or description (e.g. vtnet0 or LAN). If blank, defaults to the interface assigned as LAN. For multiple firewalls, use comma-separated values aligned with Firewall URL."
        },
        {
          "enable controller routing": true
        },
        {
          "controller config field name": true,
          "value": "connect_opnsense_url",
          "tooltip": "The app field name that has controller IP/URL"
        },
        {
          "certification validation": true
        }
      ]
    },
    {
      "focal appliance": true,
      "title": "Assign CounterACT Devices",
      "description": "<html>Select the connecting CounterACT device that will communicate with the targeted OPNSense instance, including requests by other CounterACT devices. Specific CounterACT devices assigned here cannot be assigned to another server elsewhere.<br><br>If you do not assign specific devices, by default, all devices will be assigned to one server. This server becomes known as the Default Server.<html>"
    },
    {
      "proxy server": true,
      "title": "Proxy Server",
      "description": "<html>Select a Proxy Server device to manage all communication between CounterACT and OPNSense.<html>"
    },
    {
      "title": "OPNSense Options",
      "description": "OPNSense Options",
      "fields": [
        {
          "host discovery": true,
          "display": "Discovery Frequency (in minutes)",
          "max": 43200,
          "add to column": "true",
          "show column": "false",
          "value": 10
        },
        {
          "rate limiter": true,
          "display": "Number of API queries per second",
          "unit": 1,
          "min": 1,
          "max": 100,
          "add to column": "true",
          "show column": "false",
          "value": 10
        }
      ]
    }
  ]
}
