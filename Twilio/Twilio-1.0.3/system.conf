{
  "name": "Twilio",
  "version": "1.0.3",
  "author": "Forescout Community",
  "testEnable": true,
  "panels": [
    {
      "title": "Twilio Connection",
      "description": "Twilio Connection",
      "fields": [
        {
          "display": "Account SID",
          "field ID": "connect_twilio_account_sid",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "true",
          "identifier": "true",
          "tooltip": "Twilio Account SID (found in your Twilio Console)"
        },
        {
          "display": "Auth Token",
          "field ID": "connect_twilio_auth_token",
          "type": "encrypted",
          "mandatory": "true",
          "tooltip": "Twilio Auth Token (found in your Twilio Console)"
        },
        {
          "display": "From Phone Number",
          "field ID": "connect_twilio_from_number",
          "type": "shortString",
          "mandatory": "true",
          "add to column": "true",
          "show column": "false",
          "tooltip": "Twilio phone number to send SMS from (E.164 format, e.g. +15551234567)"
        },
        {
          "certification validation": true
        }
      ]
    },
    {
      "focal appliance": true,
      "title": "Assign CounterACT Devices",
      "description": "<html>Select the connecting CounterACT device that will communicate with the targeted Twilio instance, including requests by other CounterACT devices. Specific CounterACT devices assigned here cannot be assigned to another server elsewhere.<br><br>If you do not assign specific devices, by default, all devices will be assigned to one server. This server becomes known as the Default Server.</html>"
    },
    {
      "proxy server": true,
      "title": "Proxy Server",
      "description": "<html>Select a Proxy Server device to manage all communication between CounterACT and Twilio.</html>"
    }
  ]
}
