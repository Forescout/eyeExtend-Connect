{
    "name": "WinGetPatcher",
    "groups": [
        {
            "name": "connect_wingetpatcher_updates",
            "label": "Software Updating"
        },
        {
            "name": "connect_wingetpatcher_removal",
            "label": "Software Removal"
        }
    ],
    "properties": [
        {
            "tag": "connect_wingetpatcher_updates_info",
            "label": "WinGet Updates Info",
            "description": "Composite property containing WinGet update information for this endpoint. Populated by the WinGet discovery script via HPS, then resolved into subfields by the WinGet Patcher resolver.",
            "group": "connect_wingetpatcher_updates",
            "type": "composite",
            "web_enable": true,
            "resolvable": true,
            "subfields": [
                {
                    "tag": "wingetpatcher_updates_count",
                    "label": "WinGet Updates - Count",
                    "description": "Number of applications with available updates per WinGet on this endpoint. A value of -1 indicates that WinGet was not found or not functional on the endpoint.",
                    "type": "integer"
                },
                {
                    "tag": "wingetpatcher_updates_apps",
                    "label": "WinGet Updates - Out-of-Date Apps",
                    "description": "Newline-separated list of applications with available updates, one per line, in the format 'PackageId (current_version -> available_version)'. Example: 'Google.Chrome (118.0 -> 120.0)'. Used in policy conditions to target specific applications for update via substring matching (e.g., 'contains Google.Chrome').",
                    "type": "string"
                }
            ],
            "dependencies": [
                {
                    "name": "script_result.836bc66aeb43db5a544233dec55a1f0b"
                }
            ]
        },
        {
            "tag": "connect_wingetpatcher_removal_info",
            "label": "WinGet Removal - Last Result",
            "description": "Free-form result string captured from the most recent WinGet uninstall or inventory action on this endpoint. Populated by the WingetUninstall.ps1 / WingetInventory.ps1 scripts via HPS when an action runs. Useful for policy auditing.",
            "group": "connect_wingetpatcher_removal",
            "type": "string",
            "web_enable": true,
            "resolvable": false
        }
    ],
    "action_groups": [],
    "actions": [],
    "scripts": [
        {
            "name": "winget_patcher_lib.py",
            "library_file": true
        },
        {
            "name": "winget_patcher_resolve.py",
            "properties": [
                "connect_wingetpatcher_updates_info"
            ]
        }
    ],
    "policy_template": {
        "policy_template_group": {
            "name": "connect_wingetpatcher",
            "label": "WinGet Patcher",
            "display": "WinGet Patcher",
            "description": "WinGet Patcher Templates (software updating + removal)",
            "full_description": "Templates for WinGet-based software lifecycle management on Windows endpoints. Use the Software Updating subfolder to discover and patch out-of-date applications. Use the Software Removal subfolder to inventory and remove unwanted, banned, or end-of-life software.",
            "title_image": "connect_wingetpatcher.png"
        },
        "policies": [
            {
                "name": "connect_wingetpatcher_discovery",
                "label": "1.1-WinGet Discovery",
                "display": "1.1-WinGet Discovery",
                "help": "1.1-WinGet Discovery",
                "description": "Runs WingetDiscover_v3.ps1 on scoped endpoints to enumerate out-of-date applications. Required prerequisite for all update templates.",
                "file_name": "1.1-WinGet Discovery.xml",
                "full_description": "Runs the WingetDiscover_v3.ps1 PowerShell script on scoped Windows endpoints. The script enumerates all out-of-date applications via Windows Package Manager (winget) and returns a structured list. This list is captured by Forescout and resolved into the WinGet Updates Info property, which includes subfields for update count and a combined multi-line applications/details field. Default recheck is every 24 hours; you can decrease this for more aggressive update detection.",
                "title_image": "wingetpatcher.png",
                "group": "connect_wingetpatcher_updates"
            },
            {
                "name": "connect_wingetpatcher_update_chrome",
                "label": "1.2-WinGet Update - Google Chrome",
                "display": "1.2-WinGet Update - Google Chrome",
                "help": "1.2-WinGet Update - Google Chrome",
                "description": "Patches Google Chrome on endpoints where WinGet detects an available update. Disabled by default.",
                "file_name": "1.2-WinGet Update - Google Chrome.xml",
                "full_description": "Updates ONLY Google Chrome (WinGet package ID: Google.Chrome). When enabled and scoped, this policy fires on endpoints whose WinGet Updates - Package IDs property contains Google.Chrome, then runs WingetUpdate.ps1 -PackageId Google.Chrome to silently upgrade Chrome. The next discovery cycle removes Chrome from the property and this policy stops matching for that endpoint.",
                "title_image": "wingetpatcher.png",
                "group": "connect_wingetpatcher_updates"
            },
            {
                "name": "connect_wingetpatcher_update_notepadpp",
                "label": "1.3-WinGet Update - Notepad++",
                "display": "1.3-WinGet Update - Notepad++",
                "help": "1.3-WinGet Update - Notepad++",
                "description": "Patches Notepad++ on endpoints where WinGet detects an available update. Disabled by default.",
                "file_name": "1.3-WinGet Update - Notepad++.xml",
                "full_description": "Updates ONLY Notepad++ (WinGet package ID: Notepad++.Notepad++). When enabled and scoped, this policy fires on endpoints whose WinGet Updates - Package IDs property contains Notepad++.Notepad++, then runs WingetUpdate.ps1 -PackageId 'Notepad++.Notepad++' to silently upgrade Notepad++.",
                "title_image": "wingetpatcher.png",
                "group": "connect_wingetpatcher_updates"
            },
            {
                "name": "connect_wingetpatcher_update_adobe_acrobat",
                "label": "1.4-WinGet Update - Adobe Acrobat (all variants)",
                "display": "1.4-WinGet Update - Adobe Acrobat (all variants)",
                "help": "1.4-WinGet Update - Adobe Acrobat (all variants)",
                "description": "Patches all Adobe Acrobat variants on endpoints. Uses the prefix wildcard Adobe.Acrobat.* to cover Reader 32-bit, Reader 64-bit, Pro, DC, and other variants. Disabled by default.",
                "file_name": "1.4-WinGet Update - Adobe Acrobat (all variants).xml",
                "full_description": "Updates all Adobe Acrobat variants on endpoints where WinGet detects available updates. Uses the prefix wildcard 'Adobe.Acrobat.*' which causes WingetUpdate.ps1 to enumerate all installed packages whose WinGet ID starts with 'Adobe.Acrobat.' and upgrade each one individually. This includes Reader 32-bit, Reader 64-bit, Acrobat Pro, Acrobat DC, and any other Adobe.Acrobat.* package. The script NEVER calls 'winget upgrade --all' - each matched package is upgraded by its exact WinGet ID.",
                "title_image": "wingetpatcher.png",
                "group": "connect_wingetpatcher_updates"
            },
            {
                "name": "connect_wingetpatcher_update_vcredist",
                "label": "1.5-WinGet Update - Microsoft VCRedist (all variants)",
                "display": "1.5-WinGet Update - Microsoft VCRedist (all variants)",
                "help": "1.5-WinGet Update - Microsoft VCRedist (all variants)",
                "description": "Patches all Microsoft Visual C++ Redistributable variants. Uses the prefix wildcard Microsoft.VCRedist.* to cover all year/architecture combinations. Generally low-risk; disabled by default.",
                "file_name": "1.5-WinGet Update - Microsoft VCRedist (all variants).xml",
                "full_description": "Updates all Microsoft Visual C++ Redistributable variants on endpoints where WinGet detects available updates. Uses the prefix wildcard 'Microsoft.VCRedist.*' which covers all year/architecture combinations (2015, 2017, 2019, 2022, x86, x64, etc.). The script enumerates matching installed packages and upgrades each by its exact WinGet ID - never 'winget upgrade --all'. VCRedist updates are generally low-risk and a good candidate for routine patching.",
                "title_image": "wingetpatcher.png",
                "group": "connect_wingetpatcher_updates"
            },
            {
                "name": "connect_wingetpatcher_update_custom",
                "label": "1.6-WinGet Update - Custom (Paste Package ID)",
                "display": "1.6-WinGet Update - Custom (Paste Package ID)",
                "help": "1.6-WinGet Update - Custom (Paste Package ID)",
                "description": "Generic update template. Copy a WinGet package ID from an endpoint's WinGet Updates - Package IDs property, paste it into this template's condition and action, and enable. Use the trailing .* wildcard for app families (e.g., Adobe.Photoshop.*).",
                "file_name": "1.6-WinGet Update - Custom (Paste Package ID).xml",
                "full_description": "Use this template to patch any WinGet-known application that doesn't have a pre-built template. WORKFLOW: (1) On any endpoint in Host Details, find the WinGet Updates - Package IDs property and copy the exact package ID of the app you want to patch (e.g., 'Adobe.Photoshop'). (2) Add this template to your policies. (3) Replace BOTH occurrences of [PASTE-PACKAGE-ID-HERE] with the copied ID - once in the condition's value, once in the Run Script action's command line. (4) Rename the policy to include the app name (e.g., 'WinGet Update - Adobe Photoshop'). (5) Scope, enable the policy, and enable the Run Script action. WILDCARDS: append .* for app families (e.g., 'Adobe.Photoshop.*' updates all Photoshop variants). The script enforces strict ID validation - if you forget to replace the placeholder, the script refuses to run.",
                "title_image": "wingetpatcher.png",
                "group": "connect_wingetpatcher_updates"
            },
            {
                "name": "connect_wingetpatcher_inventory",
                "label": "2.1-WinGet Inventory - Find Package ID",
                "display": "2.1-WinGet Inventory - Find Package ID",
                "help": "2.1-WinGet Inventory - Find Package ID",
                "description": "REFERENCE TEMPLATE - finds WinGet package IDs matching a partial software name. Designed to run on ONE host only; do not enable fleet-wide.",
                "file_name": "2.1-WinGet Inventory - Find Package ID.xml",
                "full_description": "<html><b>REFERENCE USE ONLY - DO NOT RUN FLEET-WIDE.</b><br><br>Helper for the Custom Uninstall template (2.6). Returns WinGet package IDs that contain a partial software name, so you can copy the exact ID into a Custom Uninstall policy.<br><br><b>Example:</b> a partial name of <code>Firefox</code> typically returns <code>Mozilla.Firefox</code> and <code>Mozilla.Firefox.ESR</code>.<br><br><b>To use:</b><ul><li>Pick ONE test host that has the software installed and copy its IP address.</li><li>Edit the Access IP condition - replace <code>192.0.2.1</code> with the IP from step 1.</li><li>Edit the Script condition - replace <code>[INSERT-SOFTWARE-NAME-HERE]</code> with the partial software name. Case-insensitive substring match against package name AND package ID.</li><li>Enable the policy.</li><li>Read the <code>WINGET_INVENTORY_MATCH=&lt;PackageId&gt;</code> lines from the policy detection view in Host Details.</li><li><b>Disable</b> this policy when done. Not intended for continuous use.</li></ul></html>",
                "title_image": "wingetuninstall.png",
                "group": "connect_wingetpatcher_removal"
            },
            {
                "name": "connect_wingetpatcher_firefox",
                "label": "2.2-WinGet Uninstall - Mozilla Firefox",
                "display": "2.2-WinGet Uninstall - Mozilla Firefox",
                "help": "2.2-WinGet Uninstall - Mozilla Firefox",
                "description": "Removes Mozilla Firefox release builds from endpoints where it is detected.",
                "file_name": "2.2-WinGet Uninstall - Mozilla Firefox.xml",
                "full_description": "<html>Removes <b>Mozilla.Firefox</b> (release channel) via WinGet. Detection uses Forescout's native 'Windows Applications Installed contains Firefox' property; action runs <code>WingetUninstall.ps1 -PackageId Mozilla.Firefox</code> via HPS.<br><br><b>Disabled by default</b> at both the policy and the action. Both must be enabled to remove anything. Scope to a test segment first. For Firefox ESR use the Custom Uninstall template (2.6) with <code>Mozilla.Firefox.ESR</code>.</html>",
                "title_image": "wingetuninstall.png",
                "group": "connect_wingetpatcher_removal"
            },
            {
                "name": "connect_wingetpatcher_flash",
                "label": "2.3-WinGet Uninstall - Adobe Flash Player",
                "display": "2.3-WinGet Uninstall - Adobe Flash Player",
                "help": "2.3-WinGet Uninstall - Adobe Flash Player",
                "description": "Removes Adobe Flash Player from endpoints where it is detected.",
                "file_name": "2.3-WinGet Uninstall - Adobe Flash Player.xml",
                "full_description": "<html>Removes <b>Adobe Flash Player</b> via WinGet. Adobe Flash reached end-of-life on 2020-12-31 and should not be present in any DoD environment. Detection uses 'Windows Applications Installed contains Flash'; action runs <code>WingetUninstall.ps1 -PackageId Adobe.Flash.*</code> via HPS to cover all Flash variants.<br><br><b>Disabled by default.</b> Scope and enable both policy and action to remove.</html>",
                "title_image": "wingetuninstall.png",
                "group": "connect_wingetpatcher_removal"
            },
            {
                "name": "connect_wingetpatcher_shockwave",
                "label": "2.4-WinGet Uninstall - Adobe Shockwave Player",
                "display": "2.4-WinGet Uninstall - Adobe Shockwave Player",
                "help": "2.4-WinGet Uninstall - Adobe Shockwave Player",
                "description": "Removes Adobe Shockwave Player from endpoints where it is detected.",
                "file_name": "2.4-WinGet Uninstall - Adobe Shockwave Player.xml",
                "full_description": "<html>Removes <b>Adobe Shockwave Player</b> via WinGet. Shockwave reached end-of-life on 2019-04-09 and should not be present in any DoD environment. Detection uses 'Windows Applications Installed contains Shockwave'; action runs <code>WingetUninstall.ps1 -PackageId Adobe.Shockwave</code> via HPS.<br><br><b>Disabled by default.</b> Scope and enable both policy and action to remove.</html>",
                "title_image": "wingetuninstall.png",
                "group": "connect_wingetpatcher_removal"
            },
            {
                "name": "connect_wingetpatcher_spotify",
                "label": "2.5-WinGet Uninstall - Spotify",
                "display": "2.5-WinGet Uninstall - Spotify",
                "help": "2.5-WinGet Uninstall - Spotify",
                "description": "Removes Spotify from endpoints where it is detected.",
                "file_name": "2.5-WinGet Uninstall - Spotify.xml",
                "full_description": "<html>Removes <b>Spotify</b> via WinGet. Detection uses 'Windows Applications Installed contains Spotify'; action runs <code>WingetUninstall.ps1 -PackageId Spotify.Spotify</code> via HPS.<br><br><b>Disabled by default.</b> Scope and enable both policy and action to remove.</html>",
                "title_image": "wingetuninstall.png",
                "group": "connect_wingetpatcher_removal"
            },
            {
                "name": "connect_wingetpatcher_custom",
                "label": "2.6-WinGet Uninstall - Custom (Paste Package ID)",
                "display": "2.6-WinGet Uninstall - Custom (Paste Package ID)",
                "help": "2.6-WinGet Uninstall - Custom (Paste Package ID)",
                "description": "Admin-extensible template - paste any WinGet package ID into the condition and the action to remove that software.",
                "file_name": "2.6-WinGet Uninstall - Custom (Paste Package ID).xml",
                "full_description": "<html>Generic removal template for any WinGet package ID not covered by the hard-coded templates above.<br><br><b>To use:</b><ul><li>Use the 2.1 Inventory template to find the exact package ID.</li><li>Edit this policy's condition: replace [PACKAGE-ID-HERE] with the package ID (e.g. <code>Mozilla.Firefox.ESR</code>).</li><li>Edit the action command: same package ID, with optional trailing <code>.*</code> for family-wide removal.</li><li>Scope to a test segment, then enable both policy and action.</li></ul>Supports prefix wildcards (must end in <code>.*</code>). Standard safety: regex validator, wildcard blocklist, system-namespace blocklist.</html>",
                "title_image": "wingetuninstall.png",
                "group": "connect_wingetpatcher_removal"
            }
        ],
        "policy_template_sub_groups": [
