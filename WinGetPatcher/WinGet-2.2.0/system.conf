      "title": "About WinGet Patcher",
      "description": "<html><p><b>WinGet Patcher</b> provides discovery, patching, and removal of software on managed Windows endpoints using Windows Package Manager (WinGet). One Connect app, two functional areas:</p><ul><li><b>Software Updating</b> (1.x templates) \u2014 discovers out-of-date applications and patches specific ones via opt-in policy templates.</li><li><b>Software Removal</b> (2.x templates) \u2014 finds package IDs and removes unwanted, banned, or end-of-life software.</li></ul><p><b>How it works:</b></p><ul><li>A discovery script runs on managed Windows endpoints via HPS and queries WinGet for available updates.</li><li>Results populate the WinGet Updates Info composite property on each endpoint.</li><li>Administrators decide which specific applications to update or remove by enabling per-application policy templates.</li></ul><p><b>Important:</b> All update and removal templates are disabled by default. Remediation is opt-in and configured per application by the administrator.</p><p><b>Requirements:</b></p><ul><li>Forescout eyeExtend Connect Module 2.1.6 or higher</li><li>Connect Plugin 2.0.4 or higher (required for the multiple-folder UI feature)</li><li>Windows endpoints with App Installer (WinGet) installed</li><li>SecureConnector OR domain manageability for script execution</li></ul></html>",
      "fields": [
        {
          "display": "Deployment Notes",
          "field ID": "connect_wingetpatcher_deployment_notes",
