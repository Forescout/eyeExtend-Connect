      "description": "<html><p>Select the CounterACT device (typically the Enterprise Manager) that will host the WinGet Patcher app runtime. For most deployments the Enterprise Manager is appropriate. In larger or resource-constrained environments, a dedicated focal appliance may be preferred.</p></html>"
