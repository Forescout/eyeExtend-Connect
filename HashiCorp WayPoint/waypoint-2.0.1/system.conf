      {
         "focal appliance":true,
         "title":"Assign CounterACT Devices",
         "description":"<html>Select the connecting CounterACT device that will communicate with the targeted WayPoint instance, including requests by other CounterACT devices. Specific CounterACT devices assigned here cannot be assigned to another server elsewhere.<br><br>If you do not assign specific devices, by default, all devices will be assigned to one server. This server becomes known as the Default Server.<html>"
