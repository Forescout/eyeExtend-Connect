         "fields":[
            {
               "display":"Connection Name",
               "field ID":"connect_waypoint_name",
               "type":"shortString",
               "value":"WayPoint",
               "mandatory":"true",
               "add to column":"true",
               "show column":"true",
               "identifier":"true",
               "tooltip":"Name that will be displayed in the list"
            },
            {
               "display":"WayPoint Base URL (http://hostname/WayPointApi)",
               "field ID":"connect_waypoint_base_url",
               "type":"shortString",
               "value":"https://charter-amc.ivanticloud.com/api",
               "mandatory":"true",
               "add to column":"true",
               "show column":"false",
               "identifier":"false",
               "tooltip":"WayPoint REST API URL to retrieve information"
            },
            {
               "display":"WayPoint Service Account",
               "field ID":"connect_waypoint_service_account",
               "type":"shortString",
               "value":"svc_Forescout_NAC_PROD",
               "mandatory":"true",
               "add to column":"true",
               "show column":"false",
               "tooltip":"The service account/user name to be used to access the system"
            },
            {
               "display":"Waypoint Service Account Role",
               "field ID":"connect_waypoint_service_account_role",
               "type":"shortString",
               "value":"ServiceDeskAnalyst",
               "mandatory":"true",
               "tooltip":"The service account role that is used to verify account role"
			},
            {
               "display":"Waypoint Service Account Password",
               "field ID":"connect_waypoint_service_account_password",
